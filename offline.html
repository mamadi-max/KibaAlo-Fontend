<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#FF6B00"/>
  <title>KibaAlo — Hors ligne</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Sora', sans-serif;
      background: #0A0A0F;
      color: #F0EDE8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 32px;
      text-align: center;
    }
    .icon { font-size: 80px; margin-bottom: 24px; animation: float 3s ease-in-out infinite; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
    h1 { font-size: 28px; font-weight: 800; margin-bottom: 12px; }
    h1 span { color: #FF6B00; }
    p { color: #A8A4A0; font-size: 15px; line-height: 1.6; max-width: 280px; margin-bottom: 32px; }
    button {
      background: #FF6B00;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 16px 32px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    button:active { transform: scale(0.97); }
  </style>
</head>
<body>
  <div class="icon">🛵</div>
  <h1><span>Kiba</span>Alo</h1>
  <p>Vous êtes hors ligne. Vérifiez votre connexion internet et réessayez.</p>
  <button onclick="window.location.reload()">🔄 Réessayer</button>
</body>
</html>
